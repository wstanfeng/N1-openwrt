name: ARMv8 Package

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本'
        required: false
        default: '6.1.y_6.6.y_6.12.y'
        type: string
      firmware_source:
        description: '固件来源'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lean
          - immwrt

  repository_dispatch:
    types: [package-armv8]

  workflow_run:
    workflows: ["ARMv8 lean", "ARMv8 immwrt"]
    types:
      - completed

permissions:
  contents: write
  actions: write

concurrency:
  group: armv8-package-${{ github.event_name }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  Prepare:
    runs-on: ubuntu-24.04
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      kernel_version: ${{ steps.set-kernel.outputs.kernel_version }}

    steps:
      - name: Set Build Matrix
        id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TRIGGER="${{ github.event.workflow_run.name }}"
            echo "触发来源: $TRIGGER"

            if [ "$TRIGGER" = "ARMv8 immwrt" ]; then
              MATRIX='{"include":[{"version":"immwrt","explain":"ARMv8 immwrt，自用精简","rootfs_tag":"ROOTFS_immwrt","repo_url":"https://github.com/immortalwrt/immortalwrt"}]}'
            else
              MATRIX='{"include":[{"version":"lean","explain":"ARMv8 lean，主打科学上网适合养老","rootfs_tag":"ROOTFS_lean","repo_url":"https://github.com/coolsnowwolf/lede"}]}'
            fi

          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SOURCE="${{ github.event.inputs.firmware_source }}"
            echo "手动选择: $SOURCE"

            if [ "$SOURCE" = "lean" ]; then
              MATRIX='{"include":[{"version":"lean","explain":"ARMv8 lean，主打科学上网适合养老","rootfs_tag":"ROOTFS_lean","repo_url":"https://github.com/coolsnowwolf/lede"}]}'
            elif [ "$SOURCE" = "immwrt" ]; then
              MATRIX='{"include":[{"version":"immwrt","explain":"ARMv8 immwrt，自用精简","rootfs_tag":"ROOTFS_immwrt","repo_url":"https://github.com/immortalwrt/immortalwrt"}]}'
            else
              MATRIX='{"include":[{"version":"lean","explain":"ARMv8 lean，主打科学上网适合养老","rootfs_tag":"ROOTFS_lean","repo_url":"https://github.com/coolsnowwolf/lede"},{"version":"immwrt","explain":"ARMv8 immwrt，自用精简","rootfs_tag":"ROOTFS_immwrt","repo_url":"https://github.com/immortalwrt/immortalwrt"}]}'
            fi

          else
            # repository_dispatch 默认构建全部
            MATRIX='{"include":[{"version":"lean","explain":"ARMv8 lean，主打科学上网适合养老","rootfs_tag":"ROOTFS_lean","repo_url":"https://github.com/coolsnowwolf/lede"},{"version":"immwrt","explain":"ARMv8 immwrt，自用精简","rootfs_tag":"ROOTFS_immwrt","repo_url":"https://github.com/immortalwrt/immortalwrt"}]}'
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "构建矩阵: $MATRIX"

      - name: Set Kernel Version
        id: set-kernel
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.kernel_version }}" ]; then
            KERNEL_VERSION="${{ github.event.inputs.kernel_version }}"
          else
            KERNEL_VERSION="6.1.y_6.6.y_6.12.y"
          fi

          echo "kernel_version=$KERNEL_VERSION" >> "$GITHUB_OUTPUT"
          echo "内核版本: $KERNEL_VERSION"

  Package:
    needs: Prepare
    runs-on: ubuntu-24.04
    name: Package for ${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.Prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Upstream Status
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          echo "上游工作流: ${{ github.event.workflow_run.name }}"
          echo "运行状态: ${{ github.event.workflow_run.conclusion }}"
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "::error::上游编译失败，跳过打包"
            exit 1
          fi

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y jq curl wget xz-utils
          sudo timedatectl set-timezone "$TZ"

      - name: Clone Source Code
        shell: bash
        run: |
          git clone --depth 1 ${{ matrix.repo_url }} -b master openwrt
          cd openwrt
          {
            echo "COMMIT_AUTHOR=$(git show -s --date=short --format='作者: %an')"
            echo "COMMIT_DATE=$(git show -s --date=short --format='时间: %ci')"
            echo "COMMIT_MESSAGE=$(git show -s --date=short --format='内容: %s')"
            echo "COMMIT_HASH=$(git show -s --date=short --format='hash: %H')"
          } >> "$GITHUB_ENV"

      - name: Download Armvirt Firmware
        id: download
        shell: bash
        run: |
          set -e

          FIRMWARE_PATH="openwrt/bin/targets/armsr/armv8"
          mkdir -p "$FIRMWARE_PATH"

          ROOTFS_TAG="${{ matrix.rootfs_tag }}"
          echo "📦 正在从 Release ($ROOTFS_TAG) 获取固件..."

          API_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/$ROOTFS_TAG"

          DOWNLOAD_URL=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "$API_URL" | \
            jq -r '.assets[]? | select(.name | contains("rootfs.tar.gz")) | .browser_download_url' | head -n 1)

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "::error::❌ 未找到 $ROOTFS_TAG 对应的 rootfs.tar.gz，请检查上游是否成功发布"
            exit 1
          fi

          echo "✅ 下载地址: $DOWNLOAD_URL"

          SUCCESS=0
          for i in 1 2 3; do
            echo "开始下载，第 $i 次尝试..."
            if wget -q --show-progress -P "$FIRMWARE_PATH" "$DOWNLOAD_URL"; then
              SUCCESS=1
              echo "✅ 下载成功"
              break
            else
              echo "⚠️ 下载失败，重试 $i/3..."
              sleep 5
            fi
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "::error::❌ 固件文件下载失败"
            exit 1
          fi

          if ! ls "$FIRMWARE_PATH"/*rootfs.tar.gz >/dev/null 2>&1; then
            echo "::error::❌ 未找到下载后的 rootfs.tar.gz 文件"
            exit 1
          fi

          ls -lh "$FIRMWARE_PATH"/

          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> "$GITHUB_ENV"
          echo "DATE1=$(date +"%y.%m.%d")" >> "$GITHUB_ENV"

      - name: Package OpenWrt Firmware
        if: steps.download.outputs.status == 'success'
        uses: ophub/flippy-openwrt-actions@main
        env:
          OPENWRT_ARMVIRT: openwrt/bin/targets/*/*/*rootfs.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: ${{ needs.Prepare.outputs.kernel_version }}
          KERNEL_AUTO_LATEST: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WHOAMI: wstanfeng
          OPENWRT_VER: R${{ env.DATE1 }}
          SW_FLOWOFFLOAD: 0
          SFE_FLOW: 0
          ENABLE_WIFI_K504: 0
          ENABLE_WIFI_K510: 0

      - name: Upload OpenWrt To Artifact
        if: env.PACKAGED_STATUS == 'success' && env.UPLOAD_RELEASE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-armvirt-${{ matrix.version }}-${{ env.DATE1 }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}

      - name: Upload OpenWrt To Release
        if: env.PACKAGED_STATUS == 'success' && env.UPLOAD_RELEASE == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: R${{ env.DATE }} for ${{ matrix.version }}
          allowUpdates: true
          removeArtifacts: true
          tag: ARMv8_${{ matrix.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          body: |
            ## OpenWrt Firmware for Armvirt 64

            ### 📒 固件信息
            | 项目 | 值 |
            |------|-----|
            | 🚀 版本类型 | ${{ matrix.explain }} |
            | 💻 平台架构 | armvirt-64 → Amlogic s905d |
            | ⚽ 源码仓库 | ${{ matrix.repo_url }} |
            | 🌐 默认地址 | 192.168.1.1 |
            | 🔑 默认密码 | password |

            ### 🧊 源码日志
            - ${{ env.COMMIT_AUTHOR }}
            - ${{ env.COMMIT_DATE }}
            - ${{ env.COMMIT_MESSAGE }}
            - ${{ env.COMMIT_HASH }}

            ### 📥 使用说明
            1. 下载对应设备的 `.img.gz` 文件
            2. 使用 balenaEtcher 或 dd 命令写入 TF 卡/U盘
            3. 插入设备启动即可

  Cleanup:
    needs: Package
    runs-on: ubuntu-24.04
    if: always()
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Delete Old Releases
        if: env.UPLOAD_RELEASE == 'true'
        continue-on-error: true
        run: |
          echo "获取 Releases 列表..."
          releases=$(gh api repos/${{ github.repository }}/releases --paginate --jq 'sort_by(.created_at) | reverse')
          count=$(echo "$releases" | jq 'length')
          echo "当前 Releases 数量: $count"
          keep=5
          if [ "$count" -le "$keep" ]; then
            echo "Releases 数量不超过 $keep，无需删除"
            exit 0
          fi
          echo "$releases" | jq -c ".[$keep:]" | while read -r release; do
            id=$(echo "$release" | jq -r '.id')
            tag=$(echo "$release" | jq -r '.tag_name')
            name=$(echo "$release" | jq -r '.name')
            echo "删除旧 Release: $name | tag=$tag | id=$id"
            gh api --method DELETE repos/${{ github.repository }}/releases/$id || true
          done

      - name: Clean Up Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2.1.0
        continue-on-error: true
        with:
          retain_days: 3
          keep_minimum_runs: 6
